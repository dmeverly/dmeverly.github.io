<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1" name="viewport" />
    <title>David Everly | Curriculum Vitae</title>

    <link href="/assets/img/favicon.ico" rel="icon" sizes="any">
    <link href="/assets/img/favicon.svg" rel="icon" type="image/svg+xml">
    <link href="/assets/img/favicon-96x96.png" rel="icon" sizes="96x96" type="image/png">
    <link href="/assets/img/apple-touch-icon.png" rel="apple-touch-icon">
    <link href="/assets/img/site.webmanifest" rel="manifest">

    <link href="https://fonts.googleapis.com" rel="preconnect">
    <link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link href="assets/css/tokens.css" rel="stylesheet" />
    <link href="assets/css/components.css" rel="stylesheet" />
</head>

<body>
    <header class="site-header glass">
        <div class="container site-header__inner">
            <div class="brand">
                <img alt="" class="brand__emblem" src="/assets/img/emblem-primary.svg" />

                <span class="brand__name">David Everly</span>


            </div>

            <nav aria-label="Primary navigation" class="site-nav">
                <a href="/index.html">Home</a>
                <a class="nav-cv" href="https://drive.google.com/file/d/12DEQ31xZ9Ly2yqND3RHz4uui553ezf49" rel="noopener">
                    Download PDF
                </a>
            </nav>

        </div>
    </header>

    <main class="section">
    <div class="container">
        <h1>Curriculum Vitae</h1>
        <div class="cv-frame" style="margin-top: 1rem;">
            <div class="cv-loading" id="cvLoading">
                <div class="cv-spinner"></div>
                <span>Loading CV…</span>
            </div>
            <iframe src="https://drive.google.com/file/d/12DEQ31xZ9Ly2yqND3RHz4uui553ezf49/preview"
                style="width:100%; height:85vh; border:0; border-radius:12px; position:relative; z-index:1;"
                title="David Everly — Curriculum Vitae"
                onload="document.getElementById('cvLoading').style.display='none';"></iframe>
        </div>
    </div>
</main>

<script>
    setTimeout(function () {
        var loader = document.getElementById('cvLoading');
        if (loader && loader.style.display !== 'none') {
            loader.innerHTML = '<span>Having trouble loading? '
                + '<a href="https://drive.google.com/file/d/12DEQ31xZ9Ly2yqND3RHz4uui553ezf49/preview" '
                + 'target="_blank" rel="noopener">Open the CV directly</a>.</span>';
        }
    }, 15000);
</script>

</body>

</html>
